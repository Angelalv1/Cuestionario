<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Duelo de Espadas - Mobile Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap');

        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: 'MedievalSharp', cursive;
            background-color: #000;
            color: #e0e0e0;
            overflow: hidden;
            margin: 0;
            padding: 0;
            user-select: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, #1a1a1a, #000);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            object-fit: contain; /* Asegura que el juego mantenga su forma en cualquier pantalla */
            background: #111;
        }

        /* HUD Superior */
        .hud {
            position: absolute;
            top: calc(15px + var(--safe-top));
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
            z-index: 10;
        }

        .health-container {
            width: 35%;
            max-width: 150px;
            background: rgba(0,0,0,0.7);
            padding: 6px;
            border: 2px solid #8b4513;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        .health-label {
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
            text-align: center;
            color: #ffd700;
        }

        .health-bar-outer {
            width: 100%;
            height: 14px;
            background: #222;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #444;
        }

        .health-bar-inner {
            height: 100%;
            background: #4ade80;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Controles Táctiles Optimizados para Pulgares */
        .controls-overlay {
            position: absolute;
            bottom: calc(25px + var(--safe-bottom));
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 5%;
            pointer-events: none;
            z-index: 20;
        }

        .control-btn {
            width: 75px;
            height: 75px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            pointer-events: auto;
            transition: transform 0.1s, background 0.1s, box-shadow 0.1s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .control-btn:active {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0.85);
            box-shadow: 0 2px 5px rgba(0,0,0,0.6);
        }

        .btn-attack {
            background: rgba(139, 0, 0, 0.6);
            border-color: #ff4444;
            width: 90px;
            height: 90px;
        }

        #message-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .btn-restart {
            background: #8b0000;
            color: white;
            padding: 18px 45px;
            border-radius: 50px;
            font-size: 1.6rem;
            border: 3px solid #ff4444;
            box-shadow: 0 0 25px rgba(139, 0, 0, 0.6);
            transition: transform 0.2s;
        }

        .btn-restart:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- HUD de Vida -->
    <div class="hud">
        <div class="health-container">
            <span class="health-label">Jugador</span>
            <div class="health-bar-outer">
                <div id="player-health-bar" class="health-bar-inner" style="width: 100%"></div>
            </div>
        </div>
        <div class="health-container">
            <span class="health-label">Enemigo</span>
            <div class="health-bar-outer">
                <div id="enemy-health-bar" class="health-bar-inner" style="width: 100%; background: #f87171;"></div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- Capa de Controles Móviles -->
    <div class="controls-overlay">
        <div class="flex gap-5">
            <div id="btn-left" class="control-btn">←</div>
            <div id="btn-right" class="control-btn">→</div>
        </div>
        <div class="flex gap-5 items-end">
            <div id="btn-jump" class="control-btn" style="width: 65px; height: 65px; font-size: 26px;">↑</div>
            <div id="btn-attack" class="control-btn btn-attack">⚔️</div>
        </div>
    </div>

    <div id="message-overlay">
        <h2 id="result-text" class="text-4xl mb-10 text-white text-center font-bold uppercase tracking-widest">¡VICTORIA!</h2>
        <button class="btn-restart" onclick="resetGame()">Nueva Batalla</button>
    </div>
</div>

<audio id="snd-fanfare" src="freesound_community-medieval-fanfare-6826.mp3"></audio>
<audio id="snd-sword" src="freesound_community-draw-sword1-44724.mp3"></audio>
<audio id="snd-tension" src="montogoronto-short-percussive-orchestral-tension-v02-481586.mp3" loop></audio>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('message-overlay');
    const resultText = document.getElementById('result-text');
    const playerHB = document.getElementById('player-health-bar');
    const enemyHB = document.getElementById('enemy-health-bar');

    // Resolución interna fija para mantener proporciones en todos los móviles
    const BASE_WIDTH = 800;
    const BASE_HEIGHT = 400;
    canvas.width = BASE_WIDTH;
    canvas.height = BASE_HEIGHT;

    const sounds = {
        fanfare: document.getElementById('snd-fanfare'),
        sword: document.getElementById('snd-sword'),
        tension: document.getElementById('snd-tension')
    };

    function playSound(name) {
        if (sounds[name]) {
            sounds[name].currentTime = 0;
            sounds[name].play().catch(() => {});
        }
    }

    const GRAVITY = 0.65;
    const GROUND_Y = canvas.height - 40;
    let gameActive = true;

    class Fighter {
        constructor(x, color, isPlayer) {
            this.x = x;
            this.y = GROUND_Y - 80;
            this.width = 40;
            this.height = 80;
            this.color = color;
            this.isPlayer = isPlayer;
            this.health = 100;
            this.velX = 0;
            this.velY = 0;
            this.isJumping = false;
            this.isAttacking = false;
            this.attackCooldown = false;
            this.direction = isPlayer ? 1 : -1;
            this.stunned = false;
        }

        draw() {
            ctx.save();
            
            // Sombra
            ctx.fillStyle = "rgba(0,0,0,0.4)";
            ctx.beginPath();
            ctx.ellipse(this.x + this.width/2, GROUND_Y, 25, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            // Cuerpo
            ctx.fillStyle = this.stunned ? '#ffffff' : this.color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
            
            // Bordes del caballero
            ctx.strokeStyle = 'rgba(0,0,0,0.4)';
            ctx.lineWidth = 2;
            ctx.strokeRect(this.x, this.y, this.width, this.height);

            // Casco
            ctx.fillStyle = '#444';
            ctx.fillRect(this.x + 5, this.y - 18, 30, 28);
            ctx.fillStyle = '#222';
            ctx.fillRect(this.x + 8, this.y - 10, 24, 5); // Visor

            // Brazo y Arma
            ctx.translate(this.x + (this.direction === 1 ? this.width : 0), this.y + 45);
            if (this.isAttacking) {
                ctx.fillStyle = '#f0f0f0';
                ctx.fillRect(this.direction === 1 ? 0 : -65, -6, 65, 12);
                ctx.strokeStyle = '#fff';
                ctx.strokeRect(this.direction === 1 ? 0 : -65, -6, 65, 12);
            } else {
                ctx.rotate(this.direction === 1 ? 0.4 : -0.4);
                ctx.fillStyle = '#999';
                ctx.fillRect(this.direction === 1 ? -5 : -5, 0, 10, 45);
                ctx.fillStyle = '#5a3a22'; // Empuñadura
                ctx.fillRect(this.direction === 1 ? -8 : -8, -5, 16, 6);
            }
            ctx.restore();
        }

        update() {
            if (!gameActive) return;

            // Física de salto
            this.y += this.velY;
            if (this.y + this.height < GROUND_Y) {
                this.velY += GRAVITY;
                this.isJumping = true;
            } else {
                this.y = GROUND_Y - this.height;
                this.velY = 0;
                this.isJumping = false;
            }

            // Movimiento lateral
            this.x += this.velX;
            if (this.x < 0) this.x = 0;
            if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;

            if (this.stunned) {
                this.velX *= 0.6;
                setTimeout(() => this.stunned = false, 120);
            }
        }

        attack() {
            if (this.attackCooldown || !gameActive) return;
            this.isAttacking = true;
            this.attackCooldown = true;
            if (this.isPlayer) playSound('sword');

            // Lógica de colisión de ataque
            setTimeout(() => {
                const opponent = this.isPlayer ? enemy : player;
                const swordXStart = this.direction === 1 ? this.x + this.width : this.x - 65;
                const swordXEnd = swordXStart + 65;

                if (swordXEnd > opponent.x && swordXStart < opponent.x + opponent.width &&
                    this.y + 65 > opponent.y && this.y < opponent.y + opponent.height) {
                    opponent.takeDamage(12);
                }
                this.isAttacking = false;
            }, 80);

            setTimeout(() => this.attackCooldown = false, 400);
        }

        takeDamage(amount) {
            this.health -= amount;
            this.stunned = true;
            
            // Actualización de UI
            if (this.isPlayer) playerHB.style.width = Math.max(0, this.health) + '%';
            else enemyHB.style.width = Math.max(0, this.health) + '%';

            if (this.health <= 0) {
                this.health = 0;
                endGame(this.isPlayer ? "EL ENEMIGO HA VENCIDO" : "¡HAS GANADO EL DUELO!");
            }
        }
    }

    const player = new Fighter(120, '#3b82f6', true);
    const enemy = new Fighter(640, '#ef4444', false);

    const activeKeys = { left: false, right: false };

    // Configuración de controles táctiles avanzada
    function setupMobileControls() {
        const bind = (id, actionStart, actionEnd) => {
            const el = document.getElementById(id);
            
            const handleStart = (e) => {
                e.preventDefault();
                actionStart();
                if (sounds.tension.paused) playSound('tension');
            };
            
            const handleEnd = (e) => {
                e.preventDefault();
                if (actionEnd) actionEnd();
            };

            el.addEventListener('touchstart', handleStart, {passive: false});
            el.addEventListener('touchend', handleEnd, {passive: false});
            
            // Fallback para mouse (PC)
            el.addEventListener('mousedown', actionStart);
            if (actionEnd) el.addEventListener('mouseup', actionEnd);
        };

        bind('btn-left', () => { activeKeys.left = true; player.direction = -1; }, () => activeKeys.left = false);
        bind('btn-right', () => { activeKeys.right = true; player.direction = 1; }, () => activeKeys.right = false);
        bind('btn-jump', () => { if(!player.isJumping) player.velY = -12.5; });
        bind('btn-attack', () => player.attack());
    }

    // Soporte para teclado (desarrollo/híbrido)
    window.addEventListener('keydown', e => {
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') activeKeys.left = true;
        if (e.code === 'KeyD' || e.code === 'ArrowRight') activeKeys.right = true;
        if (e.code === 'Space' || e.code === 'KeyK') player.attack();
        if ((e.code === 'KeyW' || e.code === 'ArrowUp') && !player.isJumping) player.velY = -12.5;
        if (sounds.tension.paused) playSound('tension');
    });
    window.addEventListener('keyup', e => {
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') activeKeys.left = false;
        if (e.code === 'KeyD' || e.code === 'ArrowRight') activeKeys.right = false;
    });

    function updateAI() {
        if (!gameActive) return;
        const dist = player.x - enemy.x;
        
        // Inteligencia artificial básica de combate
        if (Math.abs(dist) > 75) {
            enemy.velX = dist > 0 ? 3 : -3;
            enemy.direction = dist > 0 ? 1 : -1;
        } else {
            enemy.velX = 0;
            if (Math.random() < 0.06) enemy.attack();
        }

        // Reacción de salto
        if (player.isJumping && !enemy.isJumping && Math.random() < 0.03) {
            enemy.velY = -11.5;
        }
    }

    function endGame(text) {
        gameActive = false;
        resultText.innerText = text;
        overlay.style.display = 'flex';
        sounds.tension.pause();
        if (text.includes("GANADO")) playSound('fanfare');
    }

    function resetGame() {
        player.health = 100; player.x = 120;
        enemy.health = 100; enemy.x = 640;
        playerHB.style.width = '100%';
        enemyHB.style.width = '100%';
        gameActive = true;
        overlay.style.display = 'none';
        playSound('tension');
    }

    function drawEnvironment() {
        // Suelo de arena/piedra
        ctx.fillStyle = '#2a1a0a';
        ctx.fillRect(0, GROUND_Y, canvas.width, 40);
        
        // Línea de horizonte
        ctx.fillStyle = '#1a0a00';
        ctx.fillRect(0, GROUND_Y, canvas.width, 3);

        // Antorchas de fondo animadas
        const time = Date.now() * 0.005;
        for(let i=100; i<canvas.width; i+=250) {
            ctx.fillStyle = '#444';
            ctx.fillRect(i, 120, 8, 130);
            
            // Llama
            const flicker = Math.sin(time + i) * 3;
            ctx.fillStyle = '#ff4400';
            ctx.beginPath();
            ctx.arc(i+4, 115, 6 + flicker, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ffcc00';
            ctx.beginPath();
            ctx.arc(i+4, 115, 3 + flicker/2, 0, Math.PI*2);
            ctx.fill();
        }
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        drawEnvironment();

        if (gameActive) {
            player.velX = 0;
            if (activeKeys.left) player.velX = -6;
            if (activeKeys.right) player.velX = 6;
            updateAI();
        }

        player.update();
        enemy.update();
        player.draw();
        enemy.draw();

        requestAnimationFrame(gameLoop);
    }

    window.onload = () => {
        setupMobileControls();
        gameLoop();
        
        // Bloquear comportamientos nativos molestos en móviles
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.body.addEventListener('touchmove', (e) => {
            if (e.target.closest('.control-btn')) e.preventDefault();
        }, {passive: false});
    };
</script>

</body>
</html>
